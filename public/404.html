<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - 页面不存在</title>
<style>
  body{margin:0;padding:0;background:#f9f8f6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Noto Sans SC",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1a1a2e}
  .wrap{text-align:center;padding:2rem}
  .code{font-size:120px;font-weight:700;color:#5046e4;line-height:1;letter-spacing:-4px;margin-bottom:8px}
  .msg{font-size:18px;color:#5c5c6e;margin-bottom:28px}
  .links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .links a{display:inline-flex;align-items:center;padding:10px 20px;background:#5046e4;color:#fff;text-decoration:none;border-radius:8px;font-size:14px;font-weight:500;transition:background .2s}
  .links a:hover{background:#4038cc}
  .links a.sec{background:#e8e5df;color:#1a1a2e}
  .links a.sec:hover{background:#ddd8ce}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <div class="msg">你要找的东西不在这。</div>
  <div class="links">
    <a href="/">🏠 返回首页</a>
    <a href="/check" class="sec">🔍 查询状态</a>
    <a href="/admin" class="sec">🔐 管理后台</a>
  </div>
</div>
</body>
</html>
