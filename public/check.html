<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>查询友链申请状态</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cream: '#f9f8f6',
          accent: '#5046e4',
          'accent-light': '#ede9fe',
          'accent-hover': '#4338ca',
          heading: '#1a1a2e',
          body: '#5c5c6e',
          'body-light': '#9ca3af',
          warm: '#f5f0eb',
        }
      }
    }
  }
</script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background-color: #f9f8f6;
  }
  [x-cloak] { display: none !important; }
  
  .card-hover {
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-hover:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.08), 0 4px 12px -4px rgba(0, 0, 0, 0.04);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 9999px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .status-pending   { background: #fef3c7; color: #b45309; }
  .status-approved  { background: #d1fae5; color: #047857; }
  .status-rejected  { background: #fee2e2; color: #b91c1c; }
  .status-not_found { background: #f3f4f6; color: #6b7280; }

  .input-search:focus {
    border-color: #5046e4;
    box-shadow: 0 0 0 3px rgba(80, 70, 228, 0.12);
    outline: none;
  }

  .pattern-dots {
    background-image: radial-gradient(#e5e3e0 1px, transparent 1px);
    background-size: 24px 24px;
  }
</style>
</head>
<body class="min-h-screen">

<!-- Subtle dot pattern overlay -->
<div class="pattern-dots fixed inset-0 pointer-events-none opacity-40 z-0"></div>

<div x-data="app()" x-cloak class="relative z-10 max-w-3xl mx-auto px-4 md:px-6 py-8 md:py-14">

  <!-- ── Header ── -->
  <header class="text-center mb-10">
    <h1 class="text-2xl md:text-3xl font-bold text-heading tracking-tight mb-2">
      查询申请
    </h1>
    <p class="text-body text-sm md:text-base leading-relaxed">
      输入你的网站标题或链接，查看审核结果
    </p>
  </header>

  <!-- ── Search Card ── -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100/80 p-4 md:p-6 mb-8">
    <form @submit.prevent="search" class="flex flex-col sm:flex-row gap-3">
      <div class="flex-1 relative">
        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-body-light pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input x-model="query" type="text" required
          class="input-search w-full pl-10 pr-4 py-2.5 min-h-[44px] bg-gray-50 border border-gray-200 rounded-lg text-sm text-heading placeholder-body-light transition-colors"
          placeholder="输入网站标题或链接">
      </div>
      <button type="submit" :disabled="loading"
        class="w-full sm:w-auto inline-flex items-center justify-center px-6 py-2.5 min-h-[44px] bg-accent hover:bg-accent-hover disabled:opacity-60 disabled:cursor-not-allowed text-white text-sm font-medium rounded-lg transition-all duration-200 whitespace-nowrap shadow-sm hover:shadow-md">
        <span x-show="!loading">查询</span>
        <span x-show="loading" class="inline-flex items-center gap-1.5">
          <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          查询中…
        </span>
      </button>
    </form>
  </div>

  <!-- ── Results ── -->
  <div x-show="result" x-transition>

    <!-- Empty State -->
    <div x-show="result.items && result.items.length === 0"
      class="bg-white rounded-xl shadow-sm border border-gray-100/80 text-center py-16 px-6">
      <div class="text-5xl mb-4">📭</div>
      <p class="text-heading font-semibold text-lg mb-1">没有找到相关记录</p>
      <p class="text-body-light text-sm">请确认输入的是网站标题或完整链接，再试一次</p>
    </div>

    <!-- Card Grid -->
    <div x-show="result.items && result.items.length > 0" class="grid grid-cols-1 gap-4 md:gap-5">
      <template x-for="(item, i) in result.items" :key="i">
        <article
          class="bg-white rounded-xl shadow-sm border border-gray-100/80 overflow-hidden card-hover"
          :class="item.record.pinned ? 'border-l-[3px] border-l-accent' : ''"
          x-transition>

          <!-- Pinned star -->
          <div x-show="item.record.pinned"
            class="flex items-center gap-1.5 px-4 md:px-5 pt-4 pb-0 text-xs font-medium text-accent">
            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
            已置顶
          </div>

          <div class="p-4 md:p-5">
            <!-- Status badge -->
            <div class="mb-3">
              <span class="status-badge" :class="'status-' + item.status"
                x-text="{pending:'⏳ 审核中',approved:'✅ 已通过',rejected:'❌ 已拒绝'}[item.status]"></span>
            </div>

            <!-- Site info row -->
            <div class="flex items-start gap-3.5">
              <img
                :src="item.record.avatar"
                @error="$event.target.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23d1d5db%22%3E%3Cpath d=%22M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z%22/%3E%3C/svg%3E'"
                class="w-12 h-12 rounded-full object-cover border-2 border-gray-100 flex-shrink-0 shadow-sm">
              <div class="flex-1 min-w-0">
                <h3 class="font-semibold text-heading truncate text-[15px]" x-text="item.record.title"></h3>
                <a :href="item.record.link" target="_blank" rel="noopener"
                  class="text-sm text-accent hover:text-accent-hover hover:underline truncate block mt-0.5 transition-colors"
                  x-text="item.record.link"></a>
              </div>
            </div>

            <!-- Description -->
            <div class="mt-3.5">
              <p class="text-xs font-medium text-body-light uppercase tracking-wide mb-1">描述</p>
              <p class="text-sm text-body leading-relaxed" x-text="item.record.descr"></p>
            </div>

            <!-- RSS badge -->
            <div x-show="item.record.rss" class="mt-3 inline-flex flex-wrap items-center gap-1.5 bg-orange-50 text-orange-700 text-xs font-medium px-2.5 py-1 rounded-full">
              <svg class="w-3 h-3 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M6.18 15.64a2.18 2.18 0 010 4.36 2.18 2.18 0 010-4.36M4 4.44A15.56 15.56 0 0119.56 20h-2.83A12.73 12.73 0 004 7.27V4.44m0 5.66a9.9 9.9 0 019.9 9.9h-2.83A7.07 7.07 0 004 12.93v-2.83z"/></svg>
              <span class="flex-shrink-0">RSS</span>
              <a :href="item.record.rss" target="_blank" rel="noopener"
                class="underline underline-offset-2 hover:text-orange-800 transition-colors break-all min-w-0"
                x-text="item.record.rss"></a>
            </div>

            <!-- Meta info -->
            <div class="mt-4 pt-3.5 border-t border-gray-100 text-xs text-body-light space-y-1.5">
              <p class="flex flex-wrap items-center gap-1.5">
                <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                <span class="whitespace-nowrap flex-shrink-0">提交时间：</span><span x-text="formatDate(item.record.createdAt)" class="text-body"></span>
              </p>
              <p x-show="item.record.approvedAt" class="flex flex-wrap items-center gap-1.5">
                <svg class="w-3.5 h-3.5 text-emerald-500 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="whitespace-nowrap flex-shrink-0">通过时间：</span><span x-text="formatDate(item.record.approvedAt)" class="text-body"></span>
              </p>
              <p x-show="item.record.rejectedAt" class="flex flex-wrap items-center gap-1.5">
                <svg class="w-3.5 h-3.5 text-red-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="whitespace-nowrap flex-shrink-0">拒绝时间：</span><span x-text="formatDate(item.record.rejectedAt)" class="text-body"></span>
              </p>
              <p x-show="item.record.rejectReason"
                class="flex items-start gap-1.5 px-2.5 py-2 bg-red-50 rounded-lg text-red-700">
                <svg class="w-3.5 h-3.5 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
                <span class="min-w-0">拒绝原因：<span x-text="item.record.rejectReason"></span></span>
              </p>
            </div>
          </div>
        </article>
      </template>
    </div>

    <!-- Count -->
    <div x-show="result.items && result.items.length > 0"
      class="mt-6 text-center text-xs text-body-light">
      <span class="inline-flex items-center gap-1 px-3 py-1.5 bg-white rounded-full border border-gray-100 shadow-sm">
        共 <span x-text="result.items.length" class="font-semibold text-heading"></span> 条记录
      </span>
    </div>
  </div>

  <!-- ── Footer ── -->
  <footer class="mt-12 text-center text-xs text-body-light">
    <div class="flex flex-wrap items-center justify-center gap-x-4 gap-y-2">
      <a href="/" class="inline-flex items-center min-h-[44px] hover:text-accent transition-colors duration-200">返回申请页</a>
      <span class="text-gray-300 hidden sm:inline">|</span>
      <a href="/admin.html" class="inline-flex items-center min-h-[44px] hover:text-accent transition-colors duration-200">管理后台</a>
    </div>
  </footer>

</div>

<script>
function app() {
  return {
    query: '',
    loading: false,
    result: null,
    async search() {
      if (!this.query.trim()) return;
      this.loading = true;
      this.result = null;
      try {
        const resp = await fetch('/api/status?q=' + encodeURIComponent(this.query));
        const data = await resp.json();
        this.result = data.data || { items: [] };
      } catch (e) {
        alert('查询失败：' + e.message);
      } finally {
        this.loading = false;
      }
    },
    formatDate(s) {
      if (!s) return '';
      const d = new Date(s);
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
  };
}
</script>
</body>
</html>
